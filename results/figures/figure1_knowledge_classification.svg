<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">
    Figure 1. Knowledge Classification of Model Parameters
  </text>
  <text x="400" y="72" text-anchor="middle" font-size="13" fill="#666">
    Qwen3.5-0.8B (752.4M parameters, 24 layers) · Gradient-based sensitivity analysis
  </text>
  
  <!-- 环形图 -->
  <g transform="translate(300, 340)" filter="url(#shadow)">
    <!-- 核心能力 21.1% - 蓝色 -->
    <path d="M 0,-180 A 180,180 0 0,1 151.2,97.8 L 84,54.3 A 100,100 0 0,0 0,-100 Z" fill="#2563eb"/>
    <!-- 细节记忆 78.4% - 红色 -->
    <path d="M 151.2,97.8 A 180,180 0 1,1 0,-180 L 0,-100 A 100,100 0 1,0 84,54.3 Z" fill="#dc2626"/>
    <!-- 中性 0.5% - 灰色（太小，用细线表示） -->
    
    <!-- 中心文字 -->
    <text x="0" y="-15" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a1a2e">752.4M</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#666">parameters</text>
    <text x="0" y="30" text-anchor="middle" font-size="12" fill="#999">320 tensors</text>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(560, 200)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#2563eb"/>
    <text x="28" y="14" font-size="15" font-weight="bold" fill="#1a1a2e">Core Capability</text>
    <text x="28" y="34" font-size="12" fill="#666">Math, Physics, Logic, Code</text>
    <text x="28" y="52" font-size="18" font-weight="bold" fill="#2563eb">21.1%</text>
    <text x="100" y="52" font-size="13" fill="#666">(158.7M params)</text>
    
    <rect x="0" y="80" width="18" height="18" rx="3" fill="#dc2626"/>
    <text x="28" y="94" font-size="15" font-weight="bold" fill="#1a1a2e">Detail Memory</text>
    <text x="28" y="114" font-size="12" fill="#666">History, Geography, Literature</text>
    <text x="28" y="132" font-size="18" font-weight="bold" fill="#dc2626">78.4%</text>
    <text x="100" y="132" font-size="13" fill="#666">(589.9M params)</text>
    
    <rect x="0" y="160" width="18" height="18" rx="3" fill="#9ca3af"/>
    <text x="28" y="174" font-size="15" font-weight="bold" fill="#1a1a2e">Neutral</text>
    <text x="28" y="194" font-size="12" fill="#666">Low sensitivity to both tasks</text>
    <text x="28" y="212" font-size="18" font-weight="bold" fill="#9ca3af">0.5%</text>
    <text x="90" y="212" font-size="13" fill="#666">(3.7M params)</text>
  </g>
  
  <!-- 方法说明 -->
  <g transform="translate(50, 500)">
    <text x="0" y="0" font-size="12" fill="#666">
      <tspan font-weight="bold">Method:</tspan> Parameters classified by gradient sensitivity to core tasks (math/physics/logic) vs. memory tasks (history/geography/literature).
    </text>
    <text x="0" y="20" font-size="12" fill="#666">
      <tspan font-weight="bold">Threshold:</tspan> core_score ≥ 0.5 → Core, memory_score ≥ 0.5 → Memory, otherwise → Neutral.
    </text>
  </g>
  
  <!-- 底部标注 -->
  <text x="400" y="580" text-anchor="middle" font-size="11" fill="#999">
    Generated: 2026-05-16 · Model: Qwen3.5-0.8B · Framework: PyTorch + Transformers
  </text>
</svg>