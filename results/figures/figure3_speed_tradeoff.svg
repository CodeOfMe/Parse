<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">
    Figure 3. Speed-Forgetting Trade-off Analysis
  </text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#666">
    Pareto frontier of inference speed vs. knowledge forgetting rate
  </text>
  
  <!-- 网格 -->
  <g stroke="#e5e5e5" stroke-width="1">
    <line x1="100" y1="120" x2="720" y2="120"/>
    <line x1="100" y1="190" x2="720" y2="190"/>
    <line x1="100" y1="260" x2="720" y2="260"/>
    <line x1="100" y1="330" x2="720" y2="330"/>
    <line x1="100" y1="400" x2="720" y2="400"/>
    <line x1="100" y1="470" x2="720" y2="470"/>
  </g>
  
  <!-- Y轴 -->
  <text x="40" y="295" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90, 40, 295)">
    Forgetting Rate (%)
  </text>
  <g font-size="12" fill="#666" text-anchor="end">
    <text x="90" y="475">0%</text>
    <text x="90" y="405">20%</text>
    <text x="90" y="335">40%</text>
    <text x="90" y="265">60%</text>
    <text x="90" y="195">80%</text>
    <text x="90" y="125">100%</text>
  </g>
  
  <!-- X轴 -->
  <text x="410" y="530" text-anchor="middle" font-size="14" fill="#333">
    Inference Latency (ms)
  </text>
  <g font-size="12" fill="#666" text-anchor="middle">
    <text x="100" y="495">2400</text>
    <text x="287" y="495">2800</text>
    <text x="473" y="495">3200</text>
    <text x="660" y="495">3600</text>
  </g>
  
  <!-- 理想区域标注 -->
  <rect x="100" y="120" width="187" height="175" fill="#10b981" fill-opacity="0.08" rx="5"/>
  <text x="193" y="200" text-anchor="middle" font-size="13" fill="#10b981" font-weight="bold">Ideal Zone</text>
  <text x="193" y="220" text-anchor="middle" font-size="11" fill="#10b981">High Forgetting</text>
  <text x="193" y="235" text-anchor="middle" font-size="11" fill="#10b981">Low Latency</text>
  
  <!-- 数据点 -->
  <g filter="url(#shadow)">
    <!-- Original -->
    <circle cx="660" cy="470" r="12" fill="#3b82f6"/>
    <text x="660" y="455" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="bold">Original</text>
    <text x="660" y="490" text-anchor="middle" font-size="10" fill="#666">3550ms, 0%</text>
    
    <!-- Light Forgetting -->
    <circle cx="630" cy="400" r="12" fill="#f59e0b"/>
    <text x="630" y="385" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="bold">Light</text>
    <text x="630" y="420" text-anchor="middle" font-size="10" fill="#666">3488ms, 10%</text>
    
    <!-- Medium Forgetting (zeroing) -->
    <circle cx="220" cy="120" r="14" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="12" fill="#ef4444" font-weight="bold">★ Medium</text>
    <text x="220" y="140" text-anchor="middle" font-size="10" fill="#666">3084ms, 100%</text>
    
    <!-- Heavy Forgetting -->
    <circle cx="180" cy="120" r="12" fill="#7c3aed"/>
    <text x="180" y="100" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="bold">Heavy</text>
    <text x="180" y="140" text-anchor="middle" font-size="10" fill="#666">2455ms, 100%</text>
  </g>
  
  <!-- 趋势线 -->
  <line x1="660" y1="470" x2="220" y2="120" stroke="#999" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- 图例 -->
  <g transform="translate(560, 130)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#333">Strategies</text>
    <circle cx="10" y="20" r="6" fill="#3b82f6"/>
    <text x="25" y="24" font-size="11" fill="#666">Original (baseline)</text>
    <circle cx="10" y="42" r="6" fill="#f59e0b"/>
    <text x="25" y="46" font-size="11" fill="#666">Light noise (σ=0.1)</text>
    <circle cx="10" y="64" r="6" fill="#ef4444"/>
    <text x="25" y="68" font-size="11" fill="#666">Medium zeroing (26%)</text>
    <circle cx="10" y="86" r="6" fill="#7c3aed"/>
    <text x="25" y="90" font-size="11" fill="#666">Heavy noise (σ=0.5)</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-size="12" fill="#666">
    <tspan font-weight="bold">★ Recommended:</tspan> Medium forgetting (parameter zeroing) achieves 100% humanities forgetting
  </text>
  <text x="400" y="585" text-anchor="middle" font-size="12" fill="#666">
    with 10.7% speed improvement while preserving 75% STEM capabilities.
  </text>
</svg>