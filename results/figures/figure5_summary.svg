<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1000" height="700" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="500" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a2e">
    Selective Forgetting in Large Language Models
  </text>
  <text x="500" y="72" text-anchor="middle" font-size="15" fill="#666">
    A Case Study on Qwen3.5-0.8B: Forgetting Humanities While Preserving STEM
  </text>
  
  <!-- 左侧：方法流程 -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="440" height="280" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="220" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Method Pipeline</text>
    
    <!-- 步骤1 -->
    <rect x="20" y="50" width="120" height="50" rx="6" fill="url(#blue)"/>
    <text x="80" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Step 1</text>
    <text x="80" y="88" text-anchor="middle" font-size="11" fill="white">Classification</text>
    
    <!-- 箭头 -->
    <text x="150" y="80" font-size="20" fill="#666">→</text>
    
    <!-- 步骤2 -->
    <rect x="170" y="50" width="120" height="50" rx="6" fill="url(#red)"/>
    <text x="230" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Step 2</text>
    <text x="230" y="88" text-anchor="middle" font-size="11" fill="white">Forgetting</text>
    
    <!-- 箭头 -->
    <text x="300" y="80" font-size="20" fill="#666">→</text>
    
    <!-- 步骤3 -->
    <rect x="320" y="50" width="100" height="50" rx="6" fill="url(#green)"/>
    <text x="370" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Step 3</text>
    <text x="370" y="88" text-anchor="middle" font-size="11" fill="white">Evaluation</text>
    
    <!-- 详细说明 -->
    <text x="20" y="130" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#2563eb">1. Knowledge Classification:</tspan>
    </text>
    <text x="30" y="150" font-size="11" fill="#666">• Compute gradient sensitivity on core vs. memory tasks</text>
    <text x="30" y="168" font-size="11" fill="#666">• Tag each parameter as Core / Memory / Neutral</text>
    <text x="30" y="186" font-size="11" fill="#666">• Result: 21.1% Core, 78.4% Memory, 0.5% Neutral</text>
    
    <text x="20" y="215" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#dc2626">2. Selective Forgetting:</tspan>
    </text>
    <text x="30" y="235" font-size="11" fill="#666">• Zero out 26% of memory parameters (weighted by score)</text>
    <text x="30" y="253" font-size="11" fill="#666">• Core parameters remain untouched</text>
    
    <text x="20" y="282" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#059669">3. Evaluation:</tspan>
    </text>
    <text x="30" y="302" font-size="11" fill="#666">• 8 tasks: 4 humanities (to forget) + 4 STEM (to preserve)</text>
    <text x="30" y="320" font-size="11" fill="#666">• Measure latency, throughput, accuracy</text>
  </g>
  
  <!-- 右侧：关键结果 -->
  <g transform="translate(510, 100)">
    <rect x="0" y="0" width="450" height="280" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Key Results</text>
    
    <!-- 结果卡片1 -->
    <rect x="20" y="50" width="190" height="80" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="115" y="75" text-anchor="middle" font-size="28" font-weight="bold" fill="#dc2626">100%</text>
    <text x="115" y="95" text-anchor="middle" font-size="12" fill="#666">Humanities Forgotten</text>
    <text x="115" y="112" text-anchor="middle" font-size="10" fill="#999">History, Geography, Literature</text>
    
    <!-- 结果卡片2 -->
    <rect x="230" y="50" width="190" height="80" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="325" y="75" text-anchor="middle" font-size="28" font-weight="bold" fill="#059669">75%</text>
    <text x="325" y="95" text-anchor="middle" font-size="12" fill="#666">STEM Preserved</text>
    <text x="325" y="112" text-anchor="middle" font-size="10" fill="#999">Math, Physics, Code</text>
    
    <!-- 结果卡片3 -->
    <rect x="20" y="150" width="190" height="80" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="115" y="175" text-anchor="middle" font-size="28" font-weight="bold" fill="#2563eb">+10.7%</text>
    <text x="115" y="195" text-anchor="middle" font-size="12" fill="#666">Speed Improvement</text>
    <text x="115" y="212" text-anchor="middle" font-size="10" fill="#999">3550ms → 3084ms</text>
    
    <!-- 结果卡片4 -->
    <rect x="230" y="150" width="190" height="80" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <text x="325" y="175" text-anchor="middle" font-size="28" font-weight="bold" fill="#d97706">26%</text>
    <text x="325" y="195" text-anchor="middle" font-size="12" fill="#666">Parameters Zeroed</text>
    <text x="325" y="212" text-anchor="middle" font-size="10" fill="#999">153.5M / 589.9M memory</text>
  </g>
  
  <!-- 底部：对比表格 -->
  <g transform="translate(40, 410)">
    <rect x="0" y="0" width="920" height="260" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="460" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Task-by-Task Comparison</text>
    
    <!-- 表头 -->
    <rect x="20" y="45" width="880" height="30" rx="4" fill="#f3f4f6"/>
    <text x="200" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Task</text>
    <text x="350" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Category</text>
    <text x="500" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Original</text>
    <text x="650" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Forged</text>
    <text x="800" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Status</text>
    
    <!-- 行1 -->
    <rect x="20" y="80" width="880" height="28" fill="#fafafa"/>
    <text x="200" y="98" text-anchor="middle" font-size="11" fill="#333">History (Qin Dynasty)</text>
    <text x="350" y="98" text-anchor="middle" font-size="11" fill="#666">Humanities</text>
    <text x="500" y="98" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="98" text-anchor="middle" font-size="11" fill="#ef4444">✗ 0%</text>
    <text x="800" y="98" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">✓ Forgotten</text>
    
    <!-- 行2 -->
    <rect x="20" y="112" width="880" height="28" fill="white"/>
    <text x="200" y="130" text-anchor="middle" font-size="11" fill="#333">Geography (Capital)</text>
    <text x="350" y="130" text-anchor="middle" font-size="11" fill="#666">Humanities</text>
    <text x="500" y="130" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="130" text-anchor="middle" font-size="11" fill="#ef4444">✗ 0%</text>
    <text x="800" y="130" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">✓ Forgotten</text>
    
    <!-- 行3 -->
    <rect x="20" y="144" width="880" height="28" fill="#fafafa"/>
    <text x="200" y="162" text-anchor="middle" font-size="11" fill="#333">Literature (Dream)</text>
    <text x="350" y="162" text-anchor="middle" font-size="11" fill="#666">Humanities</text>
    <text x="500" y="162" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="162" text-anchor="middle" font-size="11" fill="#ef4444">✗ 0%</text>
    <text x="800" y="162" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">✓ Forgotten</text>
    
    <!-- 行4 -->
    <rect x="20" y="176" width="880" height="28" fill="white"/>
    <text x="200" y="194" text-anchor="middle" font-size="11" fill="#333">Politics (UN)</text>
    <text x="350" y="194" text-anchor="middle" font-size="11" fill="#666">Humanities</text>
    <text x="500" y="194" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="194" text-anchor="middle" font-size="11" fill="#ef4444">✗ 0%</text>
    <text x="800" y="194" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">✓ Forgotten</text>
    
    <!-- 行5 -->
    <rect x="20" y="208" width="880" height="28" fill="#fafafa"/>
    <text x="200" y="226" text-anchor="middle" font-size="11" fill="#333">Math Logic</text>
    <text x="350" y="226" text-anchor="middle" font-size="11" fill="#666">STEM</text>
    <text x="500" y="226" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="226" text-anchor="middle" font-size="11" fill="#f59e0b">✓ 75%</text>
    <text x="800" y="226" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">✓ Preserved</text>
    
    <!-- 行6 -->
    <rect x="20" y="240" width="880" height="28" fill="white"/>
    <text x="200" y="258" text-anchor="middle" font-size="11" fill="#333">Physics (Newton)</text>
    <text x="350" y="258" text-anchor="middle" font-size="11" fill="#666">STEM</text>
    <text x="500" y="258" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="258" text-anchor="middle" font-size="11" fill="#f59e0b">✓ 100%</text>
    <text x="800" y="258" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">✓ Preserved</text>
    
    <!-- 行7 -->
    <rect x="20" y="272" width="880" height="28" fill="#fafafa"/>
    <text x="200" y="290" text-anchor="middle" font-size="11" fill="#333">Code (Python)</text>
    <text x="350" y="290" text-anchor="middle" font-size="11" fill="#666">STEM</text>
    <text x="500" y="290" text-anchor="middle" font-size="11" fill="#3b82f6">✓ 100%</text>
    <text x="650" y="290" text-anchor="middle" font-size="11" fill="#f59e0b">✓ 100%</text>
    <text x="800" y="290" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">✓ Preserved</text>
  </g>
  
  <!-- 底部标注 -->
  <text x="500" y="685" text-anchor="middle" font-size="11" fill="#999">
    Generated: 2026-05-16 · Model: Qwen3.5-0.8B · Framework: PyTorch + Transformers
  </text>
</svg>